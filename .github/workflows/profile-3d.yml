name: Generate 3D Contribution Graph

on:
  schedule:
    # runs daily at 18:00 UTC
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-3d-profile
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        with:
          # animated green theme that matches the README reference
          SETTING_JSON: |
            {
              "githubUserName": "${{ github.repository_owner }}",
              "fileName": "profile-green-animate.svg",
              "type": "Animation"
            }

      - name: Commit and push generated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib/
          git diff --cached --quiet || git commit -m "chore: update 3D contribution graph [skip ci]"
          git push
